# Описание пода для Redis
apiVersion: v1
kind: Pod
metadata:
  name: redis-pod
  labels:
    app: redis
spec:
  containers:
  - name: redis
    image: my-redis:latest
    imagePullPolicy: Never
---
# Сервис для доступа к Redis по имени хоста
apiVersion: v1
kind: Service
metadata:
  name: redis-service
spec:
  selector:
    app: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
---
# Описание пода для Flask-приложения
apiVersion: v1
kind: Pod
metadata:
  name: flask-pod
  labels:
    app: flask
spec:
  containers:
  - name: flask
    image: my-flask-app:latest
    imagePullPolicy: Never
    ports:
    - containerPort: 5000
---
# Сервис для доступа к Flask-приложению снаружи
apiVersion: v1
kind: Service
metadata:
  name: flask-service
spec:
  type: NodePort
  selector:
    app: flask
  ports:
    - port: 5000
      nodePort: 30001